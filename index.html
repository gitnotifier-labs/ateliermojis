<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtelierMojis – Make any image a Slack emoji</title>
    <meta
      name="description"
      content="Turn any image into a Slack-ready emoji in seconds. 128×128px, under 128KB, all in your browser."
    />
    <meta name="author" content="Gitnotifier Labs" />

    <meta property="og:site_name" content="AtelierMojis" />
    <meta
      property="og:title"
      content="AtelierMojis – Make any image a Slack emoji"
    />
    <meta
      property="og:description"
      content="Turn any image into a Slack-ready emoji in seconds."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og.png" />
    <meta
      name="twitter:title"
      content="AtelierMojis – Make any image a Slack emoji"
    />
    <meta
      name="twitter:description"
      content="Turn any image into a Slack-ready emoji in seconds."
    />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (() => {
        const key = "ateliermojis-theme";
        const stored = window.localStorage.getItem(key);
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        const useDark =
          stored === "dark" || (stored !== "light" && prefersDark);
        document.documentElement.classList.toggle("dark", useDark);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
